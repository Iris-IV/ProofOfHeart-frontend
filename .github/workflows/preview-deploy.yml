name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      pull-requests: write
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build preview
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Preview deployments use testnet with mocks disabled
          NEXT_PUBLIC_USE_MOCKS: false
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: Test SDF Network ; September 2015
          # Contract address should be set in repository secrets
          NEXT_PUBLIC_CONTRACT_ADDRESS: ${{ secrets.TESTNET_CONTRACT_ADDRESS }}

      # This is a placeholder for your deployment platform
      # Replace with your actual deployment service (Vercel, Netlify, etc.)
      - name: Deploy to preview environment
        id: deploy
        run: |
          echo "Deploying to preview environment..."
          # Example for Vercel:
          # npx vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} > deployment-url.txt
          # DEPLOYMENT_URL=$(cat deployment-url.txt)

          # For now, create a placeholder URL
          DEPLOYMENT_URL="https://pr-${{ github.event.pull_request.number }}-proofofheart.preview.example.com"
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOYMENT_URL"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.deploy.outputs.deployment_url }}';
            const prNumber = context.issue.number;

            const comment = `## 🚀 Preview Deployment

            Your preview deployment is ready!

            **Preview URL:** ${deploymentUrl}

            ⚠️ **This is a non-production environment**
            - Network: Stellar Testnet
            - Contract: Testnet deployment
            - Data: Test data only

            This preview will be automatically torn down when the PR is merged or closed.

            ---
            <sub>Commit: ${context.sha.substring(0, 7)}</sub>`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Preview Deployment')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }

  cleanup-preview:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Cleanup preview deployment
        run: |
          echo "Cleaning up preview deployment for PR #${{ github.event.pull_request.number }}"
          # Add your cleanup logic here
          # Example for Vercel:
          # npx vercel remove proofofheart-pr-${{ github.event.pull_request.number }} --token=${{ secrets.VERCEL_TOKEN }} --yes

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '🧹 Preview deployment has been torn down.'
            });
